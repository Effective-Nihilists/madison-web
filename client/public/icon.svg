  <!-- dark rounded tile with a Win9x-ish bevel -->
  <rect x="8" y="8" width="496" height="496" rx="96" fill="url(#bg)"/>
  <rect x="14" y="14" width="484" height="484" rx="90" fill="none" stroke="#3a3050" stroke-width="3"/>
  <rect x="14" y="14" width="484" height="484" rx="90" fill="none" stroke="#c2b15c" stroke-width="1.5" opacity="0.5"/>
  <!-- big muted-rainbow sparkle -->
  <path filter="url(#glow)" fill="url(#mr)"
        d="M256 64 C 282 214 298 230 448 256 C 298 282 282 298 256 448 C 230 298 214 282 64 256 C 214 230 230 214 256 64 Z"/>
  <!-- small accent sparkles -->
  <path fill="#cabfe6" opacity="0.95" d="M392 120 C 400 156 404 160 440 168 C 404 176 400 180 392 216 C 384 180 380 176 344 168 C 380 160 384 156 392 120 Z"/>
  <circle cx="132" cy="372" r="11" fill="#c2b15c"/>
  <circle cx="408" cy="356" r="7" fill="#7fae8c"/>
