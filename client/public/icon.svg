<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="mr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b06a5e"/>
      <stop offset="0.16" stop-color="#c08a52"/>
      <stop offset="0.32" stop-color="#c2b15c"/>
      <stop offset="0.48" stop-color="#8a9a5b"/>
      <stop offset="0.62" stop-color="#5e9590"/>
      <stop offset="0.78" stop-color="#6e80ac"/>
      <stop offset="0.90" stop-color="#9a6fa0"/>
      <stop offset="1" stop-color="#a96a8e"/>
    </linearGradient>
    <radialGradient id="bg" cx="0.5" cy="0.42" r="0.75">
